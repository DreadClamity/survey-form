<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Student Interest Survey</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #eaf3fb; color: #1b2a3a; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .form-container { background-color: #ffffff; padding: 35px; border-radius: 12px; box-shadow: 0 8px 24px rgba(30, 90, 160, 0.1); width: 100%; max-width: 650px; border-top: 6px solid #2f80ed; }
        h2 { margin: 0 0 5px 0; color: #1b3a63; font-size: 24px; }
        .subtitle { font-size: 14px; color: #5b7892; margin-bottom: 25px; border-bottom: 1px solid #eef3f9; padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        label.main-label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #34516e; }
        input[type="text"], input[type="number"], input[type="email"], select, textarea { width: 100%; padding: 12px; background-color: #f8fbff; border: 1px solid #c7dcef; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; background: #f8fbff; padding: 15px; border-radius: 8px; border: 1px solid #eef3f9; }
        .option-label { display: flex; align-items: center; font-size: 13px; cursor: pointer; color: #4a6076; }
        .option-label input { margin-right: 10px; width: 18px; height: 18px; accent-color: #2f80ed; cursor: pointer; }
        .button-group { display: flex; gap: 15px; margin-top: 30px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: inherit; }
        .btn-submit { background-color: #2f80ed; color: white; }
        .btn-submit:hover { background-color: #1c64c4; }
        .btn-reset { background-color: #e6eef7; color: #34516e; }
        #statusMsg { margin-top: 15px; text-align: center; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>IT Student Interest Survey</h2>
        <div class="subtitle">IT Career Aspirations & Feedback</div>
        <form id="surveyForm">
            <div class="form-group">
                <label class="main-label">Full Name</label>
                <input type="text" name="name" required placeholder="Input Your Full Name">
            </div>
            <div class="form-group" style="display:flex; gap:15px;">
                <div style="flex:1"><label class="main-label">Age</label><input type="number" name="age" required></div>
                <div style="flex:2"><label class="main-label">Email Address</label><input type="email" name="email" required></div>
            </div>
            <div class="form-group">
                <label class="main-label">Gender (Radio Buttons)</label>
                <div class="grid" style="grid-template-columns: repeat(3, 1fr);">
                    <label class="option-label"><input type="radio" name="gender" value="Male" required> Male</label>
                    <label class="option-label"><input type="radio" name="gender" value="Female"> Female</label>
                    <label class="option-label"><input type="radio" name="gender" value="Other"> Other</label>
                </div>
            </div>
            <div class="form-group">
                <label class="main-label">Course (Dropdown)</label>
                <select name="course" required>
                    <option value="" disabled selected>Select your course...</option>
                    <option value="BSIT">BSIT</option>
                    <option value="BSCS">BSCS</option>
                    <option value="BSEMC">BSEMC</option>
                    <option value="BSIS">BSIS</option>
                </select>
            </div>
            <div class="form-group">
                <label class="main-label">IT Career Interests (Checkboxes)</label>
                <div id="itGrid" class="grid"></div>
            </div>
            <div class="form-group">
                <label class="main-label">Satisfaction Level (Dropdown)</label>
                <select name="satisfactionLevel" required>
                    <option value="" disabled selected>Rate your experience...</option>
                    <option value="Excellent">Excellent</option>
                    <option value="Good">Good</option>
                    <option value="Fair">Fair</option>
                    <option value="Poor">Poor</option>
                </select>
            </div>
            <div class="form-group">
                <label class="main-label">Additional Feedback (Text Area)</label>
                <textarea name="comments" placeholder="Comments, suggestions, or feedback..."></textarea>
            </div>
            <div class="button-group">
                <button type="submit" class="btn-submit">Submit Form</button>
                <button type="reset" class="btn-reset">Reset Information</button>
            </div>
            <div id="statusMsg"></div>
        </form>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWw54NMaEvRZbpfVZ5cBQQczFz6QBzhQmqhDyzJMVSHecn80csvmAmGf2ck0TlZCIB/exec";
        
        const itCareers = ["Software Engineer", "Network Admin", "Web Developer", "Cybersecurity", "Data Scientist", "Cloud Engineer", "Project Manager", "UX/UI Designer", "Game Dev", "Mobile Dev", "AI/ML Engineer"];

        document.getElementById('itGrid').innerHTML = itCareers.map(item => `
            <label class="option-label"><input type="checkbox" name="itCareerInterests" value="${item}"> ${item}</label>
        `).join('');

        const form = document.getElementById("surveyForm");
        const status = document.getElementById("statusMsg");

        form.addEventListener("submit", e => {
            e.preventDefault();
            status.textContent = "Submitting...";
            status.style.color = "#2f80ed";
            
            const params = new URLSearchParams();
            const formData = new FormData(form);
            for (const [key, value] of formData.entries()) {
                params.append(key, value);
            }

            fetch(SCRIPT_URL, { 
                method: "POST", 
                body: params,
                headers: { "Content-Type": "application/x-www-form-urlencoded" }
            })
            .then(() => {
                status.textContent = "Submitted successfully!";
                status.style.color = "#1e9e5a";
                form.reset();
            })
            .catch(() => {
                status.textContent = "Submitted successfully!";
                status.style.color = "#1e9e5a";
                form.reset();
            });
        });
    </script>
</body>
</html>
